<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KFC | Sign in</title>
  <link rel="stylesheet" href="/static/customer/customer.css">
</head>
<body class="customer-auth">
  <header class="customer-nav"><a class="brand" href="/customer">KFC</a><a class="text-link" href="/">Kiosk demo</a></header>
  <main class="auth-shell">
    <section class="auth-card">
      <p class="eyebrow">KFC FOR YOU</p><h1 id="form-title">Welcome back</h1>
      <p id="form-subtitle">Sign in to see your personal picks.</p>
      <form id="auth-form" novalidate>
        <label>Email<input id="email" type="email" autocomplete="email" required></label>
        <label>Password<input id="password" type="password" autocomplete="current-password" minlength="8" required></label>
        <p class="form-error" id="form-error" aria-live="polite"></p>
        <button class="button primary full" id="submit-button" type="submit">Sign in</button>
      </form>
      <button class="switch-mode" id="switch-mode" type="button">New here? Create an account</button>
    </section>
  </main>
  <script src="/static/customer/login.js"></script>
</body>
</html>
